# open-brain — service-only compose file for embedding into existing stacks
#
# Usage: docker compose -f docker-compose.service.yml up --build -d
#
# Connects to an existing external Docker network where your Postgres instance lives.
# Configure the network name below to match your setup.

services:
  open-brain:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - VOYAGE_MODEL=${VOYAGE_MODEL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLIENTS_FILE=/app/clients.json
    ports:
      - "8091:8091"
    volumes:
      - ./clients.json:/app/clients.json:ro
    networks:
      - services_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  services_default:
    external: true
